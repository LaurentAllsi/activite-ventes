<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
// Page de fin auth Teams
// Récupère le token dans le fragment et le renvoie à l'app principale
(async () => {
  try {
    // Charger le SDK Teams
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://res.cdn.office.net/teams-js/2.22.0/js/MicrosoftTeams.min.js';
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });

    await microsoftTeams.app.initialize();

    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const accessToken = params.get('access_token');
    const error       = params.get('error');
    const errorDesc   = params.get('error_description');

    if (accessToken) {
      microsoftTeams.authentication.notifySuccess(accessToken);
    } else {
      microsoftTeams.authentication.notifyFailure(error || errorDesc || 'Auth échouée');
    }
  } catch(e) {
    if (typeof microsoftTeams !== 'undefined') {
      microsoftTeams.authentication.notifyFailure(e.message);
    }
  }
})();
</script>
</body>
</html>
