</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --dark: #163A9B;
      --cyan: #049AF0;
      --bg: #F2F4FA;
      --white: #ffffff;
      --muted: #8899BB;
      --success: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
      --grad: linear-gradient(135deg, #163A9B, #049AF0);
    }
    html, body { height: 100%; font-family: 'Lexend', sans-serif; background: var(--bg); color: #1a1a2e; }
    #app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--bg); position: relative; }

    /* ── NAV ── */
    .nav { position: sticky; top: 0; z-index: 50; background: var(--white);
      border-bottom: 3px solid transparent;
      border-image: linear-gradient(90deg, var(--dark), var(--cyan)) 1;
      display: flex; }
    .nav-btn { flex: 1; padding: 14px 8px; border: none; background: none; cursor: pointer;
      font-weight: 700; font-size: 13px; font-family: inherit; color: var(--muted);
      border-bottom: 3px solid transparent; margin-bottom: -3px; transition: color .2s; }
    .nav-btn.active { color: var(--dark); border-bottom-color: var(--dark); }

    /* ── CARDS ── */
    .card { background: var(--white); border-radius: 16px; padding: 16px;
      box-shadow: 0 2px 12px rgba(22,58,155,0.08); margin-bottom: 12px; }
    .card-grad { background: var(--grad); border-radius: 16px; padding: 14px 16px; margin-bottom: 12px; }

    /* ── BUTTONS ── */
    .btn-primary { background: var(--grad); border: none; border-radius: 12px; color: var(--white);
      font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity .2s; }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
    .pill { padding: 4px 12px; border-radius: 20px; border: none; font-size: 12px;
      font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; }

    /* ── SPINNER ── */
    .spinner { width: 36px; height: 36px; border: 3px solid var(--bg);
      border-top-color: var(--cyan); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── LOGIN SCREEN ── */
    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 32px; text-align: center; }
    .logo-bubble { width: 80px; height: 80px; background: var(--grad); border-radius: 20px;
      display: flex; align-items: center; justify-content: center; font-size: 36px;
      margin: 0 auto 24px; box-shadow: 0 8px 32px rgba(22,58,155,0.25); }

    /* ── SAISIE ── */
    .commercial-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .commercial-btn { background: var(--grad); border: none; border-radius: 16px; padding: 22px 12px;
      color: var(--white); font-weight: 700; font-size: 17px; cursor: pointer; font-family: inherit;
      box-shadow: 0 4px 20px rgba(22,58,155,0.22); transition: transform .15s, box-shadow .15s; }
    .commercial-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(22,58,155,0.3); }

    .metric-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 14px;
      background: var(--white); border-radius: 16px; box-shadow: 0 2px 12px rgba(22,58,155,0.08); margin-bottom: 10px; }
    .metric-label { display: flex; align-items: center; gap: 10px; flex: 1; }
    .metric-label span { font-size: 13px; font-weight: 600; color: var(--dark); line-height: 1.3; }
    .counter { display: flex; align-items: center; gap: 2px; }
    .counter-val { width: 38px; text-align: center; font-weight: 900; font-size: 22px; }
    .btn-dec { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--bg);
      background: var(--bg); font-size: 20px; font-weight: 700; cursor: pointer; color: var(--muted); font-family: inherit; }
    .btn-inc { width: 36px; height: 36px; border-radius: 50%; border: none;
      background: var(--grad); font-size: 20px; font-weight: 700; cursor: pointer; color: var(--white); font-family: inherit; }

    textarea { width: 100%; min-height: 72px; border: 1.5px solid var(--bg); border-radius: 10px;
      padding: 10px 12px; font-size: 13px; color: var(--dark); resize: none; font-family: inherit; outline: none; }
    textarea:focus { border-color: var(--cyan); }
    .date-picker { width: 100%; border: 1.5px solid var(--bg); border-radius: 10px;
      padding: 10px 12px; font-size: 14px; font-weight: 600; color: var(--dark);
      font-family: inherit; outline: none; background: var(--bg); cursor: pointer; }
    .date-picker:focus { border-color: var(--cyan); background: var(--white); }
    .date-badge-today { display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;
      background:#dcfce7;color:#166534;margin-left:8px; }
    .date-badge-past { display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;
      background:#fef9c3;color:#854d0e;margin-left:8px; }

    /* ── DASHBOARD ── */
    .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .kpi-card { background: var(--white); border-radius: 16px; padding: 12px 14px;
      box-shadow: 0 2px 12px rgba(22,58,155,0.08); }
    .cmp-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .cmp-cell { background: var(--bg); border-radius: 10px; padding: 9px 6px; text-align: center; }
    .com-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
    .com-cell { background: var(--bg); border-radius: 8px; padding: 7px 6px; text-align: center; }

    /* ── MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100;
      display: flex; align-items: center; justify-content: center; padding: 24px; }
    .modal { background: var(--white); border-radius: 18px; padding: 24px; max-width: 320px; width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2); }

    /* ── ALERTS ── */
    .alert-warn { background: #fff7ed; border: 1.5px solid var(--warn); border-radius: 16px;
      padding: 12px 14px; margin-bottom: 12px; }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--dark); color: var(--white); padding: 10px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 600; z-index: 200; opacity: 0; transition: opacity .3s;
      white-space: nowrap; }
    .toast.show { opacity: 1; }

    /* ── BADGE ── */
    .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }

    .section-title { font-weight: 700; font-size: 15px; color: var(--dark); margin-bottom: 12px; }
    .text-muted { color: var(--muted); font-size: 13px; }
    .divider { border: none; border-top: 1px solid var(--bg); margin: 10px 0; }

    .back-btn { background: none; border: none; cursor: pointer; color: var(--muted);
      font-size: 22px; padding: 0; line-height: 1; }
    .view { padding: 16px; padding-bottom: 40px; }
    .view-saisie { padding: 0; }

    /* Chart bars (pure CSS) */
    .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 120px; padding: 0 4px; }
    .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .bar { width: 100%; border-radius: 6px 6px 0 0; transition: height .4s ease; min-height: 2px; }
    .bar-label { font-size: 10px; color: var(--muted); }
    .bar-val { font-size: 10px; font-weight: 700; }

    .pills-row { display: flex; gap: 6px; flex-wrap: wrap; }
  </style>
</head>
<body>
<div id="app">
  <div id="login-screen">
    <div class="logo-bubble">🏡</div>
    <div style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">Laforêt Montauban</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────
const CLIENT_ID  = '5fcf58b8-59cd-475d-8702-906551b4aa8c';
const TENANT_ID  = '9b6f0a5e-fd44-4a3f-a1de-430911fda398';
const REDIRECT   = 'https://laurentallsi.github.io/activite-ventes/';
const EXCEL_NAME = 'Laforet_Activite_Ventes.xlsx';

const COMMERCIAUX = ['Virginie', 'William', 'Allan', 'Enzo'];
const METRICS = [

  { key: 'contactsVendeurs',   label: 'Contacts vendeurs',   short: 'Vend.',   icon: '🏠', color: '#6366f1' },
  { key: 'rdvEstimation',      label: 'RDV estimation',      short: 'Estim.',  icon: '📋', color: '#f59e0b' },
  { key: 'biensVisites',       label: 'Biens visités',       short: 'Visites', icon: '🔑', color: '#22c55e' },
  { key: 'rdvVendeur',         label: 'RDV vendeur',         short: 'RDV V.',  icon: '🤝', color: '#ec4899' },

];

// ── MSAL ─────────────────────────────────────────────────────
// instancié dans DOMContentLoaded pour garantir que le script est chargé
let msalInstance = null;

const msalConfig = {
  auth: { clientId: CLIENT_ID, authority: `https://login.microsoftonline.com/${TENANT_ID}`, redirectUri: REDIRECT },
  cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: false }
};

let accessToken  = null;
let currentUser  = null;
let workbookId   = null;
let isInTeams    = false;

// ── DETECT TEAMS ──────────────────────────────────────────────
async function detectTeams() {
  try {
    await microsoftTeams.app.initialize();
    const ctx = await microsoftTeams.app.getContext();
    isInTeams = !!ctx;
  } catch { isInTeams = false; }
  return isInTeams;
}

// ── AUTH ──────────────────────────────────────────────────────

// Teams SSO : obtient un token silencieusement via Teams
async function getTokenTeams() {
  return new Promise((resolve, reject) => {
    microsoftTeams.authentication.getAuthToken({
      successCallback: resolve,
      failureCallback: reject,
    });
  });
}

// Échange le token Teams (id_token) contre un token Graph via OBO ou loginHint
async function loginWithTeams() {
  try {
    // 1. Obtenir le token Teams (contient l'identité)
    const teamsToken = await getTokenTeams();

    // 2. Décoder le loginHint depuis le token Teams
    const payload = JSON.parse(atob(teamsToken.split('.')[1]));
    const loginHint = payload.preferred_username || payload.upn || payload.email || '';

    // 3. Acquérir le token Graph silencieusement avec le loginHint
    const accounts = msalInstance.getAllAccounts();
    let tokenRes;
    if (accounts.length > 0) {
      try {
        tokenRes = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
      } catch {
        tokenRes = await msalInstance.acquireTokenPopup({ scopes: SCOPES, loginHint });
      }
    } else {
      // Redirect flow fonctionne mieux dans Teams que popup
      await msalInstance.loginRedirect({ scopes: SCOPES, loginHint });
      return; // page va se recharger
    }
    accessToken = tokenRes.accessToken;
    currentUser = tokenRes.account;
    return true;
  } catch(e) {
    throw new Error('Connexion Teams échouée : ' + e);
  }
}

async function getToken() {
  const accounts = msalInstance.getAllAccounts();
  if (!accounts.length) throw new Error('Non connecté');
  try {
    const res = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
    return res.accessToken;
  } catch {
    // Toujours redirect, jamais popup
    await msalInstance.acquireTokenRedirect({ scopes: SCOPES, account: accounts[0] });
    return null;
  }
}

async function loginWithTeams() {
  try {
    const teamsToken = await getTokenTeams();
    const payload = JSON.parse(atob(teamsToken.split('.')[1]));
    const loginHint = payload.preferred_username || payload.upn || payload.email || '';
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      try {
        const res = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
        accessToken = res.accessToken;
        currentUser = res.account;
        return true;
      } catch {}
    }
    await msalInstance.loginRedirect({ scopes: SCOPES, loginHint });
  } catch(e) {
    throw new Error('Connexion Teams échouée : ' + e);
  }
}

async function login() {
  try {
    if (isInTeams) {
      await loginWithTeams();
    } else {
      await msalInstance.loginRedirect({ scopes: SCOPES });
    }
  } catch(e) {
    const el = document.getElementById('login-error');
    if (el) { el.style.display = 'block'; el.textContent = 'Erreur : ' + e.message; }
  }
}

// ── GRAPH API ─────────────────────────────────────────────────
async function graph(method, path, body) {
  accessToken = await getToken();
  const res = await fetch('https://graph.microsoft.com/v1.0' + path, {
    method, headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  if (res.status === 204) return null;
  return res.json();
}

// ── EXCEL SETUP ───────────────────────────────────────────────
async function ensureWorkbook() {
  // Search for existing file
  try {
    const search = await graph('GET', `/me/drive/root/search(q='${EXCEL_NAME}')?$select=id,name`);
    const found = search.value?.find(f => f.name === EXCEL_NAME);
    if (found) { workbookId = found.id; return; }
  } catch {}

  // Create new Excel file with headers via upload
  // Build a minimal XLSX using the Workbook Sessions API
  // We'll create via a PUT of simple CSV-style content then use Excel API to add sheet
  const createRes = await graph('PUT', `/me/drive/root:/${EXCEL_NAME}:/content`,
    new Blob([''], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' })
  );
  // Actually use a workaround: create via copy of template
  // Simpler: just create the file and add headers via Excel API
  workbookId = createRes?.id;

  // Add headers row
  await addHeaderRow();
}

async function addHeaderRow() {
  try {
    const headers = [['Date activité','Date saisie','Commercial',...METRICS.map(m=>m.label),'Note']];
    await graph('PATCH', `/me/drive/items/${workbookId}/workbook/worksheets/Sheet1/range(address='A1:J1')`,
      { values: headers });
  } catch {}
}

async function appendRow(entry) {
  accessToken = await getToken();
  let nextRow = 2;
  try {
    const used = await graph('GET', `/me/drive/items/${workbookId}/workbook/worksheets/Sheet1/usedRange?$select=rowCount`);
    nextRow = (used.rowCount || 1) + 1;
  } catch {}

  const saisieDate = new Date().toLocaleString('fr-FR');
  const row = [[
    entry.date,          // Date activité (choisie par le commercial)
    saisieDate,          // Date/heure de saisie réelle
    entry.commercial,
    ...METRICS.map(m => entry[m.key] || 0),
    entry.note || '',
  ]];

  await graph('PATCH',
    `/me/drive/items/${workbookId}/workbook/worksheets/Sheet1/range(address='A${nextRow}:J${nextRow}')`,
    { values: row }
  );
}

async function loadAllRows() {
  try {
    const used = await graph('GET', `/me/drive/items/${workbookId}/workbook/worksheets/Sheet1/usedRange`);
    const rows = used.values || [];
    if (rows.length < 2) return [];
    return rows.slice(1).map(r => ({
      date:               r[0],   // Date activité
      dateSaisie:         r[1],   // Date saisie réelle
      commercial:         r[2],
      contactsAcquereurs: Number(r[3]) || 0,
      contactsVendeurs:   Number(r[4]) || 0,
      rdvEstimation:      Number(r[5]) || 0,
      biensVisites:       Number(r[6]) || 0,
      rdvVendeur:         Number(r[7]) || 0,
      rdvAcquereur:       Number(r[8]) || 0,
      note:               r[9] || '',
      ts:                 new Date(r[0]).getTime()
    })).filter(r => r.date && r.commercial);
  } catch { return []; }
}

// ── UTILS ─────────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().slice(0,10); }
function weekLabel(d) {
  const date = new Date(d), jan4 = new Date(date.getFullYear(),0,4);
  const w1 = new Date(jan4); w1.setDate(jan4.getDate()-((jan4.getDay()+6)%7));
  return 'S' + (Math.floor((date-w1)/86400000/7)+1);
}
function monthLabel(d) { return ['Jan','Fév','Mar','Avr','Mai','Jui','Jul','Aoû','Sep','Oct','Nov','Déc'][new Date(d).getMonth()]; }
function getWeekStart(d) { const dt=new Date(d); dt.setDate(dt.getDate()-((dt.getDay()+6)%7)); return dt.toISOString().slice(0,10); }
function getWeekEnd(d)   { const dt=new Date(getWeekStart(d)); dt.setDate(dt.getDate()+6); return dt.toISOString().slice(0,10); }
function getMonthStart(d){ return d.slice(0,7)+'-01'; }
function getMonthEnd(d)  { const dt=new Date(d); return new Date(dt.getFullYear(),dt.getMonth()+1,0).toISOString().slice(0,10); }
function addWeeks(d,n)   { const dt=new Date(d); dt.setDate(dt.getDate()+n*7); return dt.toISOString().slice(0,10); }
function addMonths(d,n)  { const dt=new Date(d); dt.setMonth(dt.getMonth()+n); return dt.toISOString().slice(0,10); }
function sumEntries(arr) { return Object.fromEntries(METRICS.map(m=>[m.key,arr.reduce((s,e)=>s+(e[m.key]||0),0)])); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

// ── DASHBOARD ─────────────────────────────────────────────────
function renderDashboard() {
  const today = todayStr();
  const { period, dateRange, entries, chartMetric } = state;

  function getRange(mode) {
    if (mode==='all') return {from:'0000-01-01',to:'9999-12-31'};
    if (period==='week') {
      const base = mode==='current' ? today : addWeeks(today,-1);
      return {from:getWeekStart(base),to:getWeekEnd(base)};
    } else {
      const base = mode==='current' ? today : addMonths(today,-1);
      return {from:getMonthStart(base),to:getMonthEnd(base)};
    }
  }

  const range    = getRange(dateRange);
  const filtered = entries.filter(e=>e.date>=range.from&&e.date<=range.to);
  const curr     = entries.filter(e=>{const r=getRange('current');return e.date>=r.from&&e.date<=r.to;});
  const prev     = entries.filter(e=>{const r=getRange('prev');   return e.date>=r.from&&e.date<=r.to;});
  const cT       = sumEntries(curr), pT = sumEntries(prev);
  const totals   = sumEntries(filtered);
  const todayE   = entries.filter(e=>e.date===today);
  const pLabel   = period==='week' ? 'semaine' : 'mois';

  // Alerts
  const alerts = COMMERCIAUX.map(name=>{
    const last = entries.filter(e=>e.commercial===name).sort((a,b)=>b.date.localeCompare(a.date))[0];
    const days = last ? Math.floor((new Date(today)-new Date(last.date))/86400000) : null;
    return {name,days};
  }).filter(a=>a.days===null||a.days>=2);

  // Chart data
  const chartMap={}, chartOrder=[];
  filtered.forEach(e=>{
    const k = period==='week' ? weekLabel(e.date) : monthLabel(e.date);
    if(!chartMap[k]){chartMap[k]={label:k,val:0};chartOrder.push(k);}
    chartMap[k].val += e[chartMetric]||0;
  });
  const chartData = chartOrder.map(k=>chartMap[k]);
  const maxVal = Math.max(1,...chartData.map(d=>d.val));

  // Delta
  function delta(key) {
    const c=cT[key]||0, p=pT[key]||0;
    if(p===0) return c>0?'+100%':'—';
    const pct=Math.round(((c-p)/p)*100);
    return (pct>=0?'+':'')+pct+'%';
  }
  function dColor(key){ return (cT[key]||0)>=(pT[key]||0)?'#22c55e':'#ef4444'; }

  const byC = COMMERCIAUX.map(name=>{
    const mine=filtered.filter(e=>e.commercial===name);
    return {name,count:mine.length,...Object.fromEntries(METRICS.map(m=>[m.key,mine.reduce((s,e)=>s+(e[m.key]||0),0)]))};
  });

  return `<div class="view">
    <!-- Header -->
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
      <div>
        <div style="font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px">Tableau de bord</div>
        <div style="font-weight:900;font-size:22px;color:var(--dark)">Activité commerciale</div>
      </div>
      <button class="btn-primary" id="export-btn" style="padding:8px 13px;font-size:12px;border-radius:10px">⬇️ Export CSV</button>
    </div>

    <!-- Alerts -->
    ${state.showAlerts && alerts.length ? `<div class="alert-warn">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-weight:700;font-size:13px;color:#92400e">⚠️ Rapports manquants</span>
        <button id="close-alert" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px">✕</button>
      </div>
      ${alerts.map(a=>`<div style="font-size:12px;color:#92400e;margin-bottom:2px">• <b>${a.name}</b> — ${a.days===null?'aucun rapport enregistré':`pas de rapport depuis ${a.days} jour${a.days>1?'s':''}`}</div>`).join('')}
    </div>` : ''}

    <!-- Today status -->
    <div class="card-grad">
      <div style="font-size:11px;color:rgba(255,255,255,0.7);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Rapports aujourd'hui</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${COMMERCIAUX.map(n=>{
          const done=todayE.some(e=>e.commercial===n);
          return `<span style="padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;
            background:${done?'rgba(255,255,255,0.25)':'rgba(255,255,255,0.08)'};
            color:${done?'white':'rgba(255,255,255,0.4)'};
            border:1px solid ${done?'rgba(255,255,255,0.5)':'rgba(255,255,255,0.15)'}">${done?'✓':'·'} ${n}</span>`;
        }).join('')}
      </div>
    </div>

    <!-- Period selector -->
    <div class="pills-row" style="margin-bottom:14px">
      <span style="font-size:11px;color:var(--muted);align-self:center">Période :</span>
      <button class="pill" data-period="week" style="background:${period==='week'?'var(--dark)':'var(--bg)'};color:${period==='week'?'white':'var(--muted)'}">Semaine</button>
      <button class="pill" data-period="month" style="background:${period==='month'?'var(--dark)':'var(--bg)'};color:${period==='month'?'white':'var(--muted)'}">Mois</button>
      <span style="font-size:11px;color:var(--muted);align-self:center;margin-left:4px">Vue :</span>
      ${[{v:'current',l:`Cette ${pLabel}`},{v:'prev',l:`${pLabel==='semaine'?'Sem.':'Mois'} préc.`},{v:'all',l:'Tout'}].map(({v,l})=>
        `<button class="pill" data-range="${v}" style="background:${dateRange===v?'var(--cyan)':'var(--bg)'};color:${dateRange===v?'white':'var(--muted)'}">${l}</button>`
      ).join('')}
    </div>

    <!-- KPIs -->
    <div class="kpi-grid">
      ${METRICS.map(m=>`<div class="kpi-card">
        <div style="font-size:17px;margin-bottom:4px">${m.icon}</div>
        <div style="font-size:24px;font-weight:900;color:${m.color}">${totals[m.key]}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:1px">${m.label}</div>
      </div>`).join('')}
    </div>

    <!-- N vs N-1 -->
    <div class="card">
      <div class="section-title">📈 Cette ${pLabel} vs ${pLabel==='semaine'?'semaine':'mois'} précédente</div>
      <div class="cmp-grid">
        ${METRICS.map(m=>`<div class="cmp-cell">
          <div style="font-size:10px;color:var(--muted);margin-bottom:3px">${m.icon} ${m.short}</div>
          <div style="font-weight:800;font-size:17px;color:${m.color}">${cT[m.key]||0}</div>
          <div style="font-size:12px;font-weight:700;color:${dColor(m.key)}">${delta(m.key)}</div>
          <div style="font-size:9px;color:var(--muted)">vs ${pT[m.key]||0}</div>
        </div>`).join('')}
      </div>
    </div>

    <!-- Chart -->
    <div class="card">
      <div class="section-title">Tendances</div>
      <div class="pills-row" style="margin-bottom:12px">
        ${METRICS.map(m=>`<button class="pill" data-metric="${m.key}" style="background:${chartMetric===m.key?m.color:'var(--bg)'};color:${chartMetric===m.key?'white':'var(--muted)'}">${m.icon} ${m.short}</button>`).join('')}
      </div>
      ${chartData.length ? `
      <div class="bar-chart">
        ${chartData.map(d=>{
          const pct = Math.round((d.val/maxVal)*100);
          const cm = METRICS.find(m=>m.key===chartMetric);
          return `<div class="bar-wrap">
            <span class="bar-val" style="color:${cm.color}">${d.val||''}</span>
            <div class="bar" style="height:${Math.max(pct,2)}%;background:${cm.color};opacity:0.85"></div>
            <span class="bar-label">${d.label}</span>
          </div>`;
        }).join('')}
      </div>` : `<div style="text-align:center;color:var(--muted);font-size:13px;padding:24px 0">Aucune donnée</div>`}
    </div>

    <!-- Par commercial -->
    <div class="card">
      <div class="section-title">Par commercial</div>
      ${byC.map(c=>`<div style="margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--bg)">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <span style="font-weight:800;color:var(--dark);font-size:14px">${c.name}</span>
          <span style="font-size:11px;color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:10px">${c.count} jour${c.count>1?'s':''}</span>
        </div>
        <div class="com-grid">
          ${METRICS.map(m=>`<div class="com-cell">
            <div style="font-size:15px;font-weight:800;color:${m.color}">${c[m.key]}</div>
            <div style="font-size:9px;color:var(--muted);margin-top:2px">${m.icon} ${m.short}</div>
          </div>`).join('')}
        </div>
      </div>`).join('')}
    </div>

    <!-- Journal -->
    <div class="card">
      <div class="section-title">Derniers rapports</div>
      ${filtered.length===0 ? '<div class="text-muted">Aucun rapport sur cette période</div>' : ''}
      ${[...filtered].sort((a,b)=>b.ts-a.ts).slice(0,15).map((e,i)=>{
        const isDeferred = e.dateSaisie && !e.dateSaisie.startsWith(e.date);
        return `
      <div style="border-bottom:1px solid var(--bg);padding-bottom:10px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-weight:700;color:var(--dark);font-size:13px">${e.commercial}</span>
            <span style="font-size:11px;color:var(--muted)">📅 ${new Date(e.date).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})}</span>
            ${isDeferred ? `<span style="font-size:10px;color:#854d0e;background:#fef9c3;padding:1px 6px;border-radius:6px;font-weight:600">saisie différée</span>` : ''}
          </div>
          <button data-delete="${i}" style="background:none;border:none;cursor:pointer;color:#ccc;font-size:14px;padding:0 2px">✕</button>
        </div>
        ${e.dateSaisie ? `<div style="font-size:10px;color:var(--muted);margin-bottom:4px">⏱ Saisi le ${e.dateSaisie}</div>` : ''}
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          ${METRICS.filter(m=>e[m.key]>0).map(m=>`<span style="font-size:11px;color:${m.color};background:var(--bg);padding:2px 8px;border-radius:10px;font-weight:600">${m.icon} ${e[m.key]}</span>`).join('')}
        </div>
        ${e.note?`<div style="font-size:11px;color:var(--muted);margin-top:5px;font-style:italic">💬 ${e.note}</div>`:''}
      </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderModal() {
  const e = state.confirmDelete;
  return `<div class="modal-overlay">
    <div class="modal">
      <div style="font-weight:800;font-size:16px;color:var(--dark);margin-bottom:8px">Supprimer ce rapport ?</div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:20px">${e.commercial} — ${new Date(e.date).toLocaleDateString('fr-FR',{day:'numeric',month:'long'})}</div>
      <div style="font-size:11px;color:var(--warn);margin-bottom:16px">⚠️ La ligne sera supprimée du fichier Excel.</div>
      <div style="display:flex;gap:10px">
        <button id="cancel-del" style="flex:1;padding:11px;border-radius:10px;border:1.5px solid var(--bg);background:var(--bg);cursor:pointer;font-family:inherit;font-weight:600;color:var(--muted)">Annuler</button>
        <button id="confirm-del" style="flex:1;padding:11px;border-radius:10px;border:none;background:var(--danger);cursor:pointer;font-family:inherit;font-weight:700;color:white">Supprimer</button>
      </div>
    </div>
  </div>`;
}

// ── EVENTS ────────────────────────────────────────────────────
function bindEvents() {
  // Nav
  document.querySelectorAll('[data-nav]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      state.view = btn.dataset.nav;
      if(state.view==='dashboard') loadEntries();
      else render();
    });
  });

  // Commercial choice
  document.querySelectorAll('[data-commercial]').forEach(btn=>{
    btn.addEventListener('click',()=>{ state.commercial=btn.dataset.commercial; chooseCommercial(); });
  });

  // Back
  document.getElementById('back-btn')?.addEventListener('click',()=>{ state.saisieStep=0; render(); });

  // Inc/Dec
  document.querySelectorAll('[data-inc]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      state.form[btn.dataset.inc]++;
      document.getElementById('val-'+btn.dataset.inc).textContent=state.form[btn.dataset.inc];
    });
  });
  document.querySelectorAll('[data-dec]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      state.form[btn.dataset.dec]=Math.max(0,(state.form[btn.dataset.dec]||0)-1);
      document.getElementById('val-'+btn.dataset.dec).textContent=state.form[btn.dataset.dec];
    });
  });

  // Note
  document.getElementById('note-input')?.addEventListener('input',e=>state.note=e.target.value);

  // Submit
  document.getElementById('submit-btn')?.addEventListener('click',submitForm);

  // Date picker change
  document.getElementById('date-picker')?.addEventListener('change', e => {
    const newDate = e.target.value;
    state.selectedDate = newDate;
    // Load existing entry for this date if any
    const existing = state.entries.find(x=>x.commercial===state.commercial&&x.date===newDate);
    if(existing) { state.form=Object.fromEntries(METRICS.map(m=>[m.key,existing[m.key]||0])); state.note=existing.note||''; }
    else { state.form=emptyForm(); state.note=''; }
    render();
  });

  // Reset
  document.getElementById('reset-btn')?.addEventListener('click',()=>{
    state.saisieStep=0; state.form=emptyForm(); state.note=''; state.selectedDate=todayStr(); render();
  });

  // Dashboard controls
  document.querySelectorAll('[data-period]').forEach(btn=>{
    btn.addEventListener('click',()=>{ state.period=btn.dataset.period; state.dateRange='current'; render(); });
  });
  document.querySelectorAll('[data-range]').forEach(btn=>{
    btn.addEventListener('click',()=>{ state.dateRange=btn.dataset.range; render(); });
  });
  document.querySelectorAll('[data-metric]').forEach(btn=>{
    btn.addEventListener('click',()=>{ state.chartMetric=btn.dataset.metric; render(); });
  });
  document.getElementById('close-alert')?.addEventListener('click',()=>{ state.showAlerts=false; render(); });
  document.getElementById('export-btn')?.addEventListener('click',exportCSV);

  // Delete
  document.querySelectorAll('[data-delete]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const idx=parseInt(btn.dataset.delete);
      const sorted=[...state.entries].sort((a,b)=>b.ts-a.ts);
      state.confirmDelete=sorted[idx]; render();
    });
  });
  document.getElementById('cancel-del')?.addEventListener('click',()=>{ state.confirmDelete=null; render(); });
  document.getElementById('confirm-del')?.addEventListener('click',deleteEntry);
}

// ── ACTIONS ───────────────────────────────────────────────────
async function chooseCommercial() {
  state.selectedDate = todayStr();
  state.form = emptyForm(); state.note='';
  const existing = state.entries.find(e=>e.commercial===state.commercial&&e.date===state.selectedDate);
  if(existing) { state.form=Object.fromEntries(METRICS.map(m=>[m.key,existing[m.key]||0])); state.note=existing.note||''; }
  state.saisieStep=1; render();
}

async function submitForm() {
  state.saving=true; render();
  try {
    const actDate = state.selectedDate || todayStr();
    const entry = { commercial:state.commercial, date:actDate, ...state.form, note:state.note, ts:new Date(actDate).getTime() };
    state.entries = state.entries.filter(e=>!(e.commercial===entry.commercial&&e.date===entry.date));
    state.entries.push(entry);
    await appendRow(entry);
    state.saving=false; state.saisieStep=2; render();
    toast('✅ Rapport enregistré dans Excel !');
  } catch(err) {
    state.saving=false; render();
    toast('❌ Erreur : ' + err.message);
  }
}

async function deleteEntry() {
  // Note: Excel API delete is complex (shifts rows), so we reload all and rewrite
  // For simplicity we just remove from local state and show note to user
  const e = state.confirmDelete;
  state.entries = state.entries.filter(x=>!(x.commercial===e.commercial&&x.date===e.date));
  state.confirmDelete=null;
  toast('🗑️ Supprimé localement. Supprimez la ligne dans Excel si nécessaire.');
  render();
}

function exportCSV() {
  const headers = ['Date','Commercial',...METRICS.map(m=>m.label),'Note'];
  const rows = [...state.entries].sort((a,b)=>a.date.localeCompare(b.date))
    .map(e=>[e.date,e.commercial,...METRICS.map(m=>e[m.key]||0),`"${(e.note||'').replace(/"/g,'""')}"`]);
  const csv = [headers,...rows].map(r=>r.join(';')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`laforet_${todayStr()}.csv`; a.click();
  URL.revokeObjectURL(url);
}

async function loadEntries() {
  state.loading=true; render();
  try {
    state.entries = await loadAllRows();
  } catch(e) { toast('Erreur chargement : '+e.message); }
  state.loading=false; render();
}

// ── INIT ──────────────────────────────────────────────────────
async function initApp() {
  const accounts = msalInstance.getAllAccounts();
  if (!accounts.length && !accessToken) return;

  try {
    currentUser = currentUser || accounts[0];
    await ensureWorkbook();
    state.entries = await loadAllRows();
    document.getElementById('app').innerHTML = '';
    render();
  } catch(err) {
    const el = document.getElementById('login-error');
    if (el) { el.style.display='block'; el.textContent='Erreur initialisation : '+err.message; }
  }
}

// Startup
document.addEventListener('DOMContentLoaded', async () => {

  // Instanciation MSAL ici pour garantir que le script est chargé
  try {
    if (typeof msal === 'undefined') {
      throw new Error('La librairie Microsoft Auth (MSAL) n\'a pas pu être chargée. Vérifiez votre connexion internet ou que cdn.jsdelivr.net n\'est pas bloqué par votre réseau.');
    }
    msalInstance = new msal.PublicClientApplication(msalConfig);
    await msalInstance.initialize();
  } catch(e) {
    const el = document.getElementById('login-error');
    if (el) { el.style.display='block'; el.textContent='Erreur MSAL : ' + e.message; }
    return;
  }

  // Handle redirect callback (après loginRedirect)
  try {
    const result = await msalInstance.handleRedirectPromise();
    if (result) {
      currentUser = result.account;
      accessToken = result.accessToken;
    }
  } catch {}

  // Détecter si on est dans Teams
  await detectTeams();

  // Adapter le bouton selon le contexte
  const loginBtn = document.getElementById('login-btn');
  if (loginBtn) {
    if (isInTeams) {
      loginBtn.innerHTML = `
        <svg width="20" height="20" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
          <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
        </svg>
        Connexion avec votre compte Teams`;
    }
    loginBtn.addEventListener('click', login);
  }

  // Si déjà connecté → lancer directement
  await initApp();
});
</script>
