<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
const CLIENT_ID  = '5fcf58b8-59cd-475d-8702-906551b4aa8c';
const TENANT_ID  = '9b6f0a5e-fd44-4a3f-a1de-430911fda398';
const REDIRECT   = 'https://laurentallsi.github.io/activite-ventes/auth-end.html';
const SCOPES     = 'User.Read Files.ReadWrite openid profile';

// Générer un code_verifier pour PKCE
function base64urlEncode(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function generatePKCE() {
  const verifier = base64urlEncode(crypto.getRandomValues(new Uint8Array(32)));
  const encoder  = new TextEncoder();
  const data     = encoder.encode(verifier);
  const digest   = await crypto.subtle.digest('SHA-256', data);
  const challenge = base64urlEncode(digest);
  return { verifier, challenge };
}

(async () => {
  const { verifier, challenge } = await generatePKCE();
  const state = Math.random().toString(36).slice(2);

  // Stocker le verifier pour auth-end
  sessionStorage.setItem('pkce_verifier', verifier);
  sessionStorage.setItem('auth_state', state);

  const params = new URLSearchParams({
    client_id:             CLIENT_ID,
    response_type:         'code',
    response_mode:         'query',
    scope:                 SCOPES,
    redirect_uri:          REDIRECT,
    state:                 state,
    code_challenge:        challenge,
    code_challenge_method: 'S256',
    prompt:                'select_account'
  });

  window.location.href = `https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/authorize?${params}`;
})();
</script>
</body>
</html>
